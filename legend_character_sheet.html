<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Jost:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg-1:#0d1a0f;
  --bg-2:#121f14;
  --bg-3:#1a2e1c;
  --bg-4:#223324;
  --bg-5:#162018;
  --primary:#56af4c;
  --primary-dim:#2d6b45;
  --primary-bright:#7de89a;
  --secondary:#c8a94a;
  --secondary-dim:#7a6020;
  --tertiary:#3dbfa8;
  --tertiary-dim:#1e6e5e;
  --contrast:#ffffff;
  --contrast-bright:#ffffff;
  --contrast-dim:#ffffff;
  --text:#d4ecd8;
  --text-dim:#7aad85;
  --text-muted:#3d6645;
  --border:#2a4430;
  --border-bright:#3d6645;
  --accent-line:2px solid var(--primary-dim);
}

body{background:var(--bg-1);color:var(--text);font-family:'Jost',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

.mono{
    font-family:'Share Tech Mono',
    monospace
}

.sheet{
    max-width:90%;
    margin:0 auto;
    background:var(--bg-3)
}


/* Header Style */

.topbar{
    background:var(--bg-2);
    border-right:2px solid var(--border);
    padding-top:0;
    padding-left: 1.5rem;
    padding-right:1.5rem;
    padding-bottom:0;
    display:grid;
    grid-template-columns: 10% 70% 10%;
    gap:0
}

.topbar-section{
    display:flex;
    align-items:center;
    gap:10px;
    padding-top:0;
    padding-left: 1.5rem;
    padding-right:1.5rem;
    padding-bottom:0;
}

.topbar-text{
    font-family:'Share Tech Mono',monospace;font-size:13px;
    color:var(--primary);
    letter-spacing:0.08em
}

.topbar-subtext{font-size:8px;
    color:var(--text-muted);
    letter-spacing:0.12em;
    font-family:'Share Tech Mono',monospace
}

.nav{
    display:flex;
    flex-direction:row;
    padding:8px 0
}
.nav-item{
    display:flex;
    align-items:center;
    gap:8px;padding:8px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    transition:all 0.12s;
    color:var(--text-dim);
    font-size:12px;
    letter-spacing:0.06em
}
.nav-item:hover{
    background:var(--bg-3);
    color:var(--text)
}
.nav-item.active{
    background:var(--bg-3);
    border-bottom-color:var(--primary);
    color:var(--primary-bright)
}
.nav-icon{
    width:14px;
    height:14px;
    flex-shrink:0;
    opacity:0.7
}

.nav-item.active .nav-icon{opacity:1}

/* Upload Download Section Styling */

.topbar-actions{
    display:flex;align-items:center;gap:6px;
    padding:8px 0;
    border-left:1px solid var(--border);
    padding-left:1.25rem;
    margin-left:auto
}

/* hides click button for file upload */
input[type=file]{display:none}

.topbar-action-button{
    background:var(--bg-item-box);
    border:1px solid var(--primary-dim);
    color:var(--primary);
    font-family:'Share Tech Mono',monospace;
    font-size:10px;
    letter-spacing:0.08em;
    padding:5px 12px;
    cursor:pointer;
    border-radius:2px;transition:all 0.15s;
    white-space:nowrap
}

.topbar-action-button:hover{
    background:var(--bg-3);
    border-color:var(--primary);
    color:var(--primary-bright)
}


/* Main Body Styling */

.body-layout{
    display:grid;grid-template-columns:1fr 250px;
    gap:0;
    height:100%;
    min-height:600px;
}




/* Sidebar Portrait Styling */

.portrait-wrapper{
    padding:12px 12px 8px;
    border-bottom:1px solid var(--border)
}
.portrait-frame{
    width:100%;aspect-ratio:1/1;
    border:1px solid var(--primary-dim);
    background:var(--bg-2);
    display:flex;
    align-items:center;
    justify-content:center;

    gap:6px;cursor:pointer;
    color:var(--text-muted);
    font-family:'Share Tech Mono',monospace;
    font-size:9px;
    letter-spacing:0.1em;
    position:relative;
    overflow:hidden;
    border-radius:2px
}
.portrait-frame:hover{border-color:var(--primary)}
.portrait-frame img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover
}
.portrait-icon{
    width:32px;
    height:32px;
    border:1.5px solid var(--text-muted);
    border-radius:50%;display:flex;
    align-items:center;
    justify-content:center
}
.portrait-icon svg{
    width:16px;
    height:16px;
    stroke:var(--text-muted);
    fill:none
}


/* main body split between sidebar and tab switching main display */

/* Sidebar consists of character name, portrait, and char info */

<script>

    //load data
    loadLocalData()

    function loadLocalData(){

        for (let item of document.getElementsByClassName("save-data")) {
            var storedValue = localStorage.getItem(item.id)
            document.getElementById(item.id).value = storedValue;
        }
    }

    const PANELS={
        stats:{title:'Stats',dot:''},
        realtions:{title:'Relations',dot:''},
        skills:{title:'Skills',dot:''},
        traits:{title:'Traits & Backstory',dot:''},
        equipment:{title:'Equipment',dot:''},
        notes:{title:'Notes',dot:''}
    };

    function textExpand(textAreaId){
        const textArea = document.getElementById(textAreaId);
        textArea.style.height = "";
        textArea.style.height = Math.min(textArea.scrollHeight, 300) + "px";
    }

    function switchTab(name,btn){
        // reset active
        document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
        // set selected tab active
        document.getElementById('tab-'+name).classList.add('active');
        btn.classList.add('active');

        // set panel and header
        const p=PANELS[name]||{title:name,dot:''};
        document.getElementById('panel-title').textContent=p.title;
        const dot=document.getElementById('panel-dot');
        dot.className='panel-dot'+(p.dot?' '+p.dot:'');
    }

    function handleChange(id, data){
        console.log(data)
        console.log("changing " + id + " to " + data)
        localStorage.setItem(id, data)
    }

    function addSkill(listId){
        const list=document.getElementById(listId);
        const r=document.createElement('div');
        r.className='skill-content-card';
        r.innerHTML='<input class="dynamiclabel" type="text" placeholder=">>Skill.."><input type="number" id="stat-fortitude" value="12" min="4" max="12" step="2"><button class="item-del" width="12px" height="12px" onclick="this.parentElement.remove()">&#x2715;</button>';
        list.appendChild(r);
        r.querySelector('input').focus();
    }
    
    function addTalent(listId){
        const list=document.getElementById(listId);
        let children = list.childElementCount;
        const r=document.createElement('div');
        r.className='talent-content-card';
        r.innerHTML='<div class="talent-header"><input class="content-title" type="text" placeholder=">>Talent Name..."><button class="item-del" width="12px" height="12px" onclick="this.parentElement.parentElement.remove()">&#x2715;</button></div><textarea id="talent-content-' + children + '" class="content-description" spellcheck="false" onInput="textExpand(\'talent-content-' + children + '\')" placeholder=">>Description...">';
        list.appendChild(r);
        r.querySelector('input').focus();
    }

    function downloadSheet(){
        const data=gatherData();
        const name=document.getElementById('char-name')?.value||'character';
        const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download=name.replace(/\s+/g,'-').toLowerCase()+'-sheet.json';a.click();
        flashStatus('Downloaded');
    }

    function uploadSheet(e){
        const file=e.target.files[0];if(!file)return;
        const reader=new FileReader();
        reader.onload=ev=>{
            try{const data=JSON.parse(ev.target.result);applyData(data);flashStatus('Uploaded');}
            catch(err){flashStatus('Error');}
        };
        reader.readAsText(file);
        e.target.value='';
    }

</script>
